  <style>
    :root {
      --bg-1: #1a1a1f;
      --bg-2: #0a0a0d;
      --gold: #c9a96e;
      --cream: #f4e9d2;
      --cream-dim: #a89878;
      --cream-muted: #7a6b56;
      --rule: #c9a96e44;
      --rule-faint: #c9a96e22;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: radial-gradient(ellipse at top, var(--bg-1), var(--bg-2));
      color: var(--cream);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    .wordmark {
      text-align: center;
      padding: 64px 24px 0;
    }
    .wordmark h1 {
      font-family: Georgia, "Times New Roman", serif;
      font-size: 60px;
      font-weight: 300;
      color: var(--cream);
      line-height: 1;
      margin: 0;
      letter-spacing: -1px;
    }
    .wordmark .rule {
      width: 48px;
      height: 1px;
      background: var(--gold);
      margin: 24px auto 40px;
    }
    .ventures {
      display: flex;
      gap: 1px;
      background: var(--rule-faint);
      padding: 0 24px 64px;
      max-width: 1100px;
      margin: 0 auto;
    }
    .venture {
      flex: 1;
      background: var(--bg-2);
      padding: 40px 32px;
      border: 1px solid var(--rule);
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .venture .mark {
      height: 140px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 20px;
    }
    .venture .mark img { max-height: 140px; max-width: 100%; object-fit: contain; }
    .venture[data-kind="automation"] .mark img { max-height: 120px; }
    .venture .label {
      font-size: 10px;
      letter-spacing: 3px;
      color: var(--gold);
      margin-bottom: 12px;
    }
    .venture h2 {
      font-family: Georgia, "Times New Roman", serif;
      font-size: 26px;
      color: var(--cream);
      line-height: 1.1;
      margin: 0 0 14px;
      font-weight: 400;
    }
    .venture p {
      font-size: 14px;
      color: var(--cream-dim);
      line-height: 1.5;
      margin: 0 0 28px;
      max-width: 320px;
    }
    .cta {
      display: inline-block;
      border: 1px solid var(--gold);
      color: var(--cream);
      padding: 12px 26px;
      font-size: 11px;
      letter-spacing: 2px;
      text-decoration: none;
      transition: background-color 150ms ease, color 150ms ease;
    }
    .cta:hover, .cta:focus { background: var(--gold); color: var(--bg-2); }
    .venture .domain {
      font-size: 10px;
      color: var(--cream-muted);
      margin-top: 16px;
      letter-spacing: 1px;
      font-family: ui-monospace, "SF Mono", Menlo, monospace;
    }
    @media (max-width: 700px) {
      .wordmark { padding-top: 48px; }
      .wordmark h1 { font-size: 48px; }
      .ventures { flex-direction: column; padding: 0 16px 48px; }
      .venture { padding: 32px 24px; }
    }
  </style>
</head>
<body>
  <header class="wordmark">
    <h1>Anointed</h1>
    <div class="rule" aria-hidden="true"></div>
  </header>
  <main class="ventures">
    <section class="venture" data-kind="attire">
      <div class="mark"><img src="attire-mark.png" alt=""></div>
      <div class="label">CLOTHING</div>
      <h2>Attire &amp; Apparel</h2>
      <p>Faith-rooted streetwear, made to order. Hats, hoodies, tees.</p>
      <a class="cta" href="https://anointedattireapparel.com?utm_source=anointed_company&utm_medium=portal&utm_campaign=homepage_cta">VISIT SHOP &rarr;</a>
      <div class="domain">anointedattireapparel.com</div>
    </section>
    <section class="venture" data-kind="automation">
      <div class="mark"><img src="automation-mark.png" alt=""></div>
      <div class="label">SOFTWARE</div>
      <h2>Automation</h2>
      <p>Custom integrations, automations, and development consulting for small businesses.</p>
      <a class="cta" href="https://anointedautomation.net">VISIT SITE &rarr;</a>
      <div class="domain">anointedautomation.net</div>
    </section>
  </main>
</body>
